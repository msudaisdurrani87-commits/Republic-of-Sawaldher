<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a6a5a" />
      <stop offset="100%" stop-color="#d4a373" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background circle/rounded square -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <!-- Decorative inner gold circle border -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#f4f1ea" stroke-width="4" stroke-opacity="0.3" />
  <!-- Central logo text & emblem -->
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <!-- Beautiful plant emoji -->
    <text x="256" y="290" font-family="'Inter', system-ui, sans-serif" font-size="200" text-anchor="middle" fill="#ffffff">🌾</text>
    <text x="256" y="420" font-family="'Cinzel', 'Playfair Display', 'Times New Roman', serif" font-size="34" font-weight="900" letter-spacing="8" text-anchor="middle" fill="#ffffff" opacity="0.95">SAWALDHER</text>
    <text x="256" y="455" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="18" font-weight="700" letter-spacing="4" text-anchor="middle" fill="#f4f1ea" opacity="0.8">TRADE BOARD</text>
  </g>
</svg>
